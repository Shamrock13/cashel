# Cashel Demo — Trigger Render deploy on push to main
# Render auto-deploys from GitHub, so this is optional —
# kept here in case you want to add pre-deploy checks later.

name: Demo Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping deploy."
            exit 0
          fi
          curl -sf -X POST "$RENDER_DEPLOY_HOOK"
